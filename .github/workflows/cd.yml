name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cdk_or_backend: ${{ steps.filter.outputs.cdk_or_backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cdk_or_backend: ['cdk/**', 'backend/**']
            frontend: ['frontend/**']

  deploy-infra-and-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.cdk_or_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      # Note: The CDK 'DockerImageAsset' requires the Docker daemon.
      # GitHub's ubuntu-latest runners have Docker pre-installed and running.
      - name: Deploy CDK Stack
        working-directory: cdk
        run: npx cdk deploy --require-approval never

  deploy-frontend:
    needs: [detect-changes, deploy-infra-and-backend]
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.cdk_or_backend == 'true') &&
      (needs.deploy-infra-and-backend.result == 'success' || needs.deploy-infra-and-backend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Note: VITE_API_URL should point to the App Runner URL.
      # After the first deploy, you can set this in GitHub Variables.
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.APP_RUNNER_URL }}
        run: pnpm build

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
